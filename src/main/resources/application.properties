# ==========================================
# Servidor (porta 8081 para evitar conflitos)
# ==========================================
server.port=8081

# ==========================================
# PostgreSQL do Docker (porta externa 5433)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5433/lojadb
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA/Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Desabilitar H2 (não vamos mais usar)
# ==========================================
spring.h2.console.enabled=false

# ==========================================
# Actuator (Health Check)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# Logging
# ==========================================
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=MinhaChaveSecretaMuitoLongaParaJWTComPeloMenos256BitsDeTamanhoParaSegurancaAdequada2024
jwt.expiration=3600000
jwt.refresh.expiration=604800000
